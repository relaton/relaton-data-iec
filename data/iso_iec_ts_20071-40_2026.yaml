abstract:
- content: "<p>This document provides an introduction to and basic guidance on augmentative
    and alternative communication (AAC) in the information and communication technology
    (ICT) domain. It also provides common definitions and a framework for the development
    of further, more detailed guidance relating to aspects of these AACs.</p><p>This
    document recognizes that AAC can be delivered on various ICT devices and the importance
    of consistency for users across devices. It applies to AAC software and not the
    devices on which the software is used.</p><p>This document recognizes that AAC
    provides many users with a unique form of communication that is not necessarily
    based on any specific natural language.</p>"
