abstract:
- content: IEC 62899-403-2:2026 specifies commonly utilized basic design patterns
    to evaluate the reproducibility of printed pattern from the viewpoint of the quality
    of printing plate for the printed electronics. Printing plates in this document
    include not only gravure, relief (flexo), and offset plates, but also a cylinder
    for rotary printing and mesh masks for screen printing. Inkjet printing is out
    of the scope of this document.
