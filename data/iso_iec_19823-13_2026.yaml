abstract:
- content: "<p>This document describes the test methods for determining conformance
    for the security crypto suite Grain-128A defined in ISO/IEC 29167-13.</p><p>This
    document contains conformance tests for all mandatory and optional functions.</p><p>Unless
    otherwise specified, the tests in this document are only applicable to radio frequency
    identification (RFID) tags and interrogators defined in the ISO/IEC 18000 series
    using ISO/IEC 29167-13.</p>"
