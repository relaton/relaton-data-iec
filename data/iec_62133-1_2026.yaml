abstract:
- content: "IEC 62133-1:2026 specifies requirements and tests for the safe operation
    of portable sealed secondary nickel cells and batteries containing alkaline electrolyte,
    under intended use and reasonably foreseeable misuse. This second edition cancels
    and replaces the first edition of IEC 62133-1 published in 2017. It constitutes
    a technical revision.<br />\r\nThis edition includes the following significant
    technical changes with respect to IEC 62133 1:2017:<br />\r\na) removal of the
    definition \"secondary battery\";<br />\r\nb) removal of the definition \"portable
    battery\";<br />\r\nc) \"removal of the definition \"portable cell\";<br />\r\nd)
    replacement of the single term \"room temperature\" with 20 °C ± 5 °C in 7.2.3;<br
    />\r\ne) modification of Figure 1."
  language:
  - en
  script:
  - Latn
  format: text/html
- content: "L'IEC 62133-1:2026 spécifie les exigences et les essais pour le fonctionnement
    en toute sécurité des accumulateurs portables étanches au nickel contenant un
    électrolyte alcalin dans des conditions d’utilisations prévues et dans des conditions
    d’utilisation abusive raisonnablement prévisible. Cette deuxième édition annule
    et remplace la première édition de l’IEC 62133-1 parue en 2017. Cette édition
    constitue une révision technique.<br />\r\nCette édition inclut les modifications
    techniques majeures suivantes par rapport à l’IEC 62133 1:2017:<br />\r\na) suppression
    de la définition \"batterie d’accumulateurs\";<br />\r\nb) suppression de la définition
    \"batterie portable\";<br />\r\nc) suppression de la définition \"élément portable\";<br
    />\r\nd) remplacement du terme unique \"température ambiante\" par 20 °C ± 5 °C
    au 7.2.3;<br />\r\ne) modification de la Figure 1."
