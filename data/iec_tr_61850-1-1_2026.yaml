abstract:
- content: "IEC TR 61850-1-1:2026 which is a technical report, is applicable to power
    utility automation systems (PUAS). It defines the communication between intelligent
    electronic devices (IEDs) in such a system, and the related system requirements.
    This part gives an introduction and overview of the standard series. It refers
    to and might include text and figures coming from other parts of the standard
    series.<br />\r\nThis document replaces the second edition of IEC TR 61850-1 published
    in 2013. The number has been changed from IEC TR 61850-1 to IEC TR 61850-1-1,
    as in the meantime there is also a document with the number IEC 61850-1-2. This
    edition constitutes a technical revision.<br />\r\nThis edition includes the following
    significant changes with respect to the previous edition:<br />\r\nUpdates to
    the TISSUE process.<br />\r\nDescriptions of the namespace concepts.<br />\r\nRenumbering
    the document from IEC 61850-1 to 61850-1-1."
