abstract:
- content: "IEC 60335-2-105:2026 deals with the safety of electric multifunctional
    shower cabinets and electric separate multifunctional shower units for household
    and similar purposes, their rated voltage being not more than 250 V for single-phase
    appliances and 480 V for other appliances including DC supplied appliances. Appliances
    not intended for normal household use but which nevertheless can be a source of
    danger to the public, such as appliances intended to be used by laymen in hotels,
    fitness centres and similar locations, are within the scope of this standard.<br
    />\r\nAs far as is practicable, this standard deals with the common hazards presented
    by appliances that are encountered by all persons in and around the home. However,
    in general, it does not take into account<br />\r\n- persons (including children)
    whose physical, sensory or mental capabilities; or lack of experience and knowledge
    prevents them from using the appliance safely without supervision or instruction;<br
    />\r\n- children playing with the appliance.<br />\r\nAttention is drawn to the
    fact that<br />\r\n- for appliances intended to be used in vehicles or on board
    ships or aircraft, additional requirements can be necessary;<br />\r\n- in many
    countries, additional requirements are specified by the national health authorities,
    the national water supply authorities, the national authorities responsible for
    the protection of labour and similar authorities;<br />\r\n- in many countries,
    mechanical strength, impact resistance and shattering properties of shower enclosures
    can be covered by national regulations.<br />\r\nIf an appliance incorporates
    a part that is within the scope of IEC 60598 series or IEC 62368 series, the part
    is tested in accordance with the relevant standard as far as reasonable.<br />\r\nThis
    standard does not apply to<br />\r\n- instantaneous water heaters used for showering
    (IEC 60335-2-35);<br />\r\n- shower-boost pumps (IEC 60335-2-41);<br />\r\n- appliances
    intended for medical purposes;<br />\r\n- appliances intended to be used in locations
    where special conditions prevail, such as the presence of a corrosive or explosive
    atmosphere (dust, vapour or gas).<br />\r\nThis third edition cancels and replaces
    the second edition published in 2016 and Amendment 1:2019. This edition constitutes
    a technical revision.<br />\r\nThis edition includes the following significant
    technical changes with respect to the previous edition:<br />\r\na) alignment
    with IEC 60335-1:2020;<br />\r\nb) conversion of some notes to normative text
    (Clause 1);<br />\r\nc) updates to the surface temperature requirements (11.8,
    Table 101).<br />\r\nThis part 2 is to be used in conjunction with the latest
    edition of IEC 60335-1 and its amendments unless that edition precludes it; in
    that case, the latest edition that does not preclude it is used. It was established
    on the basis of the sixth edition (2020) of that standard."
