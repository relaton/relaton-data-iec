- content: "L'IEC 60335-2-105:2026 traite de la sécurité des cabines de douche multifonctions
    électriques et des colonnes de douche multifonctions électriques, à usage domestique
    et analogue, dont la tension assignée est inférieure ou égale à 250 V pour les
    appareils monophasés et à 480 V pour les autres appareils, y compris les appareils
    alimentés en courant continu. Les appareils non destinés à un usage domestique
    normal, mais qui peuvent néanmoins constituer une source de danger pour le public,
    tels que les appareils destinés à être utilisés par des utilisateurs non avertis
    dans des hôtels, des centres de remise en forme et lieux analogues, sont compris
    dans le domaine d'application de la présente norme.<br />\r\nDans la mesure du
    possible, la présente norme traite des dangers courants que présentent les appareils
    et auxquels sont exposés tous les individus situés à l'intérieur et autour de
    l'habitation. Cependant, elle ne tient en général pas compte<br />\r\n- des personnes
    (y compris des enfants) dont les capacités physiques, sensorielles ou mentales;
    ou le manque d'expérience et de connaissance les empêchent d'utiliser l'appareil
    en toute sécurité sans surveillance ou instruction;<br />\r\n- des enfants qui
    jouent avec l'appareil.<br />\r\nL'attention est attirée sur le fait que<br />\r\n-
    pour les appareils destinés à être utilisés dans des véhicules ou à bord de navires
    ou d'avions, des exigences supplémentaires peuvent être nécessaires;<br />\r\n-
    dans de nombreux pays, des exigences supplémentaires sont spécifiées par les organismes
    nationaux de la santé, par les organismes nationaux responsables de l'alimentation
    en eau, par les organismes nationaux responsables de la protection des travailleurs
    et par des organismes similaires;<br />\r\n- dans de nombreux pays, la résistance
    mécanique, la résistance aux chocs et les propriétés en cas d'éclatement des cabines
    de douche peuvent être couvertes par les réglementations nationales.<br />\r\nSi
    un appareil comporte une partie relevant du domaine d'application de la série
    IEC 60598 ou de la série IEC 62368, la partie est soumise à l'essai conformément
    à la norme correspondante pour autant qu'il soit raisonnable.<br />\r\nLa présente
    norme ne s'applique pas<br />\r\n- aux chauffe-eau instantanés utilisés pour la
    douche (IEC 60335-2-35);<br />\r\n- aux pompes de circulation pour douches (IEC
    60335-2-41);<br />\r\n- aux appareils destinés à des usages médicaux;<br />\r\n-
    aux appareils destinés à être utilisés dans des locaux qui présentent des conditions
    particulières, telles que la présence d'une atmosphère corrosive ou explosive
    (poussière, vapeur ou gaz).<br />\r\nCette troisième édition annule et remplace
    la deuxième édition parue en 2016 et l'Amendement 1:2019. Cette édition constitue
    une révision technique.<br />\r\nCette édition inclut les modifications techniques
    majeures suivantes par rapport à l'édition précédente:<br />\r\na) le texte a
    été aligné sur l'IEC 60335-1:2020;<br />\r\nb) certaines notes ont été converties
    en texte normatif (Article 1);<br />\r\nc) les exigences pour la température de
    surface ont été mises à jour (11.8, Tableau 101).<br />\r\nLa présente partie
    2 doit être utilisée conjointement avec la dernière édition de l'IEC 60335-1 et
    ses amendements sauf si cette édition l'exclut. Dans ce cas, la dernière édition
    qui n'exclut pas la présente partie 2 est utilisée. Elle a été établie sur la
    base de la sixième édition (2020) de cette norme."
