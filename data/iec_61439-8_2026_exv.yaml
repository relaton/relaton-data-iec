abstract:
- content: "<!--StartFragment --><p>IEC 61439-8:2026 EXV contains both the international
    standard and its extended version (EXV). This extended version of the official
    IEC Standard is available in English only and provides the user with a comprehensive
    content of the Standard. IEC 61439-8:2026 EXV includes the content of the references
    made to IEC 61439-1:2020.<br /><br />\r\nIEC 61439-8:2026 specifies requirements
    for the design and verification of low voltage switchgear and controlgear assemblies
    for use in photovoltaic installations.<br />\r\nPVAs have the following characteristics:<br
    />\r\n- assemblies used for the combination of electrical energy in DC systems
    for which the input and output voltage does not exceed 1 500 V DC;<br />\r\n-
    assemblies supplied from an AC network where the voltage does not exceed 1 000
    V AC for auxiliary and control purposes;<br />\r\n- stationary assemblies with
    an enclosure;<br />\r\n- assemblies intended for operation by authorised persons
    (see IEC 61439 1:2020, 3.7.17), but can be located in an area accessible to ordinary
    persons (see IEC 61439 1:2020, 3.7.16);<br />\r\n- suitable for indoor or outdoor
    installation.<br />\r\nThis document identifies definitions, specifies the service
    conditions, details the construction requirements, defines the technical characteristics,
    and provides verifications for PVAs. PVAs can also include control or signalling
    devices, or both, associated with the distribution of electrical energy. This
    document applies to all PVAs whether they are designed and manufactured on a one-off
    basis or fully standardized and manufactured in quantity. Either the manufacture
    or assembly, or both, can be carried out by an entity other than the original
    manufacturer (see IEC 61439 1:2020, 3.10.1).<br />\r\nThis document does not apply
    to:<br />\r\n- individual devices, for example, circuit-breakers, fuse switches
    and self-contained components such as, motor starters, switch mode power supplies
    (SMPS), uninterruptable power supplies (UPS), basic drive modules (BDM), complete
    drive modules (CDM), adjustable speed power drives systems (PDS), stand-alone
    energy storage systems (battery and capacitor systems), other electronic equipment
    which comply with their relevant product standards, such as junction boxes of
    photovoltaic modules. This document describes their integration into a PVA or
    an empty enclosure used as a part of a PVA;<br />\r\n- photovoltaic power conversion
    equipment (PCE) incorporating DC combination sub-systems, covered by the IEC 62109
    series.<br />\r\nSome applications, such as either explosive atmospheres or functional
    safety, or both, can be subject to the requirements of other standards or local
    installation rules in addition to those specified in the IEC 61439 series. This
    document does not apply to the specific types of assemblies covered by other parts
    of the IEC 61439 series.</p><!--EndFragment -->"
