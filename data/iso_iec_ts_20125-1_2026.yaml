abstract:
- content: "<p>This document is applicable to environmental matters for a digital
    service. It establishes requirements and recommendations applicable for requirements
    gathering, design, implementation, operations, maintenance and the end of life
    of digital services in order to minimise adverse environmental impacts during
    all stages of its life cycle. It also establishes a common language and understanding
    on this subject.</p><p>This document focuses on reducing the environmental impacts
    of a digital service. It therefore does not address all aspects of digital service
    design. For example, it does not address other aspects such as performance, resilience,
    reliability, availability or development language choice (see other standards
    covering these topics, e.g. ISO/IEC 25010 and ISO/IEC 27001).</p><p>This document
    does not include matters linked to other corporate social responsibility (CSR)
    topics, e.g. social, cultural, diversity, inclusion or exclusion.</p><p>This document
    is applicable to all development methodologies (waterfall, agile, etc.).</p>"
