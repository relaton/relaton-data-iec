abstract:
- content: "<p>This document specifies the crypto suite for AES-128 for the ISO/IEC
    18000 air interface standards for radio frequency identification (RFID) devices.</p><p>This
    document specifies the security services of an AES-128 crypto suite. AES has a
    fixed block size of 128 bits and a key size of 128 bits, 192 bits or 256 bits.
    This document uses AES with a fixed key size of 128 bits and is referred to as
    AES-128.</p><p>This document specifies procedures for the authentication of a
    Tag and or an Interrogator using AES-128 and provides the following features:</p><ul><li>Tag
    authentication;</li><li>Tag authentication allowing authenticated and encrypted
    reading of part of the Tag’s memory;</li><li>Interrogator authentication;</li><li>Interrogator
    authentication allowing authenticated and encrypted writing of part of the Tag’s
    memory;</li><li>Mutual authentication.</li></ul><p>In this document, a Tag and
    an Interrogator can support one, a subset, or all of the specified options, clearly
    stating what is supported.</p>"
