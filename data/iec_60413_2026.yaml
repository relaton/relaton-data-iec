abstract:
- content: "IEC 60413:2026 concerns graphite-based grades that are used for sliding
    electrical contacts, such as carbon brushes or pantograph strips. By extension,
    it is possible to apply the test procedures of this document to all electrical
    sliding contacts for electrical transmission appliances and to other appliances
    of graphite-based materials (heat exchangers, bearings, etc.). This document specifies
    uniformized procedures for determining their following properties:<br />\r\n-
    density and porosity;<br />\r\n- resistivity;<br />\r\n- flexural strength;<br
    />\r\n- hardness;<br />\r\n- ash content.<br />\r\nIn addition, it provides recommendations
    on test procedures for other properties:<br />\r\n- Mechanical properties: Charpy
    impact test, compressive strength, tensile strength (Annex B).<br />\r\n- Thermal
    properties: coefficient of thermal expansion, specific heat capacity, thermal
    conductivity (Annex C).<br />\r\nThe properties determined by these tests are
    inherent to the graphite-based materials and it is therefore important to distinguish
    them from performance characteristics in operation on electrical equipment (carbon
    brush in an electrical rotating machine, contact strips on a pantograph, etc.).
    Since these materials are generally brittle, porous materials, it is reasonable
    that their properties vary much more than the same properties in metals. Some
    test methods are suitable for use in production quality control (routine tests),
    others only for more thorough investigations, using precise laboratory techniques
    (see Annex A).<br />\r\nWARNING — The use of this document can involve hazardous
    substances, operations and equipment. It does not purport to address all of the
    safety or environmental problems associated with its use. It is the responsibility
    of the user of this document to establish appropriate safety and health practices
    and determine the applicability of regulatory limitations prior to use.<br />\r\nThis
    second edition cancels and replaces the first edition published in 1972. This
    edition constitutes a technical revision. This edition includes the following
    significant technical changes with respect to the previous edition:<br />\r\na)
    Title modified.<br />\r\nb) Addition of definitions in Clause 3.<br />\r\nc) Clause
    5 on test specimen: Nomenclature and addition of the different types of test specimen,
    specification on their dimensions, tolerances and preparation.<br />\r\nd) Improvement
    of test procedures of the properties already disclosed in the previous edition
    (Clause 6 to Clause 11).<br />\r\ne) Separation of apparent density and apparent
    porosity (respectively Clause 6 and Clause 10).<br />\r\nf) Resistivity (Clause
    7): Addition of the eddy current method.<br />\r\ng) Rebound hardness (Clause
    9): Addition of a new model of scleroscope and addition of Leeb method, as a possible
    alternative to the traditional scleroscope method.<br />\r\nh) Common elements
    of the test report in a dedicated Clause 12.<br />\r\ni) Addition of Annex A (normative):
    introduction of tests categories (serial/type tests), list of properties to be
    tested for each test category of test according to their purpose.<br />\r\nj)
    Addition of Annex B: test procedures for other mechanical properties than flexural
    strength and hardness: tensile, compressive and impact strength.<br />\r\nk) Addition
    of Annex C: test procedures for thermal properties (coefficient of linear expansion,
    specific heat capacity and thermal conductivity).<br />\r\nl) Addition of Annex
    D: supplement to density and porosity.<br />\r\nm) Addition of Annex E: recommendations
    on methods for elements analysis.<br />\r\nn) Addition of Annex F: supplement
    of information concerning scleroscope hardness."
