- content: "IEC 60413:2026 concerne les nuances à base de graphite utilisées pour
    les contacts électriques glissants, tels que les balais ou les bandes de pantographes.
    Par extension, il est possible d'appliquer les modes opératoires d'essai du présent
    document à tous les contacts électriques glissants des équipements de transmission
    électrique et à d'autres applications de matériaux à base de graphite (échangeurs
    de chaleur, roulements, etc.). Le présent document spécifie des procédures uniformisées
    pour déterminer leurs propriétés suivantes:<br />\r\n- densité et porosité;<br
    />\r\n- résistivité;<br />\r\n- résistance à la flexion;<br />\r\n- dureté;<br
    />\r\n- teneur en cendres.<br />\r\nEn outre, il fournit des recommandations sur
    les modes opératoires d'essai pour d'autres propriétés:<br />\r\n- propriétés
    mécaniques: essai de choc Charpy, résistance à la compression, résistance à la
    traction (Annexe B);<br />\r\n- propriétés thermiques: coefficient de dilatation
    thermique, capacité thermique massique, conductivité thermique (Annexe C).<br
    />\r\nLes propriétés déterminées par ces essais sont inhérentes aux matériaux
    à base de graphite et par conséquent, il est important de les distinguer par rapport
    aux caractéristiques de performance en service sur les équipements électriques
    (balai dans une machine électrique tournante, bandes de contact sur un pantographe,
    etc.).<br />\r\nÉtant donné qu'il s'agit de matériaux généralement fragiles et
    poreux, il est raisonnable que leurs propriétés varient beaucoup plus que les
    mêmes propriétés dans les métaux.<br />\r\nCertaines méthodes d'essai conviennent
    au contrôle de la qualité de la production (essais individuels de série), d'autres
    sont réservées à des examens plus approfondis, qui font appel à des techniques
    de laboratoire précises (voir l'Annexe A).<br />\r\nAVERTISSEMENT — L'utilisation
    du présent document peut impliquer la mise en œuvre de substances, d'opérations
    et de matériels dangereux. Ce document ne prétend pas couvrir tous les problèmes
    environnementaux ou de sécurité liés à son utilisation. Il incombe à l'utilisateur
    du présent document d'établir des pratiques appropriées en matière d'hygiène et
    de sécurité et de déterminer l'applicabilité des limitations réglementaires avant
    l'utilisation.<br />\r\nCette deuxième édition annule et remplace la première
    édition parue en 1972. Cette édition constitue une révision technique.<br />\r\nCette
    édition inclut les modifications techniques majeures suivantes par rapport à l'édition
    précédente:<br />\r\na) le titre a été modifié;<br />\r\nb) des définitions ont
    été ajoutées à l'Article 3;<br />\r\nc) Article 5 sur les éprouvettes: la nomenclature
    et différents types d'éprouvettes, la spécification de leurs dimensions, leurs
    tolérances et leur préparation ont été ajoutés;<br />\r\nd) les modes opératoires
    d'essai des propriétés déjà divulguées dans l'édition précédente (Articles 6 à
    11) ont été améliorés;<br />\r\ne) la densité apparente et la porosité apparente
    font l'objet d'articles distincts (Articles 6 et 10 respectivement);<br />\r\nf)
    résistivité (Article 7): la méthode par courants de Foucault a été ajoutée;<br
    />\r\ng) dureté rebond (Article 9): un nouveau modèle de scléroscope et la méthode
    Leeb ont été ajoutés comme alternative possible à la méthode classique du scléroscope;<br
    />\r\nh) les éléments communs du rapport d'essai ont été consignés dans l'Article
    12 correspondant;<br />\r\ni) l'Annexe A (normative) a été ajoutée avec l'introduction
    des catégories d'essais (essais en série/essais de type) et une liste de propriétés
    à soumettre à l'essai pour chaque catégorie d'essai en fonction de leur objet;<br
    />\r\nj) l'Annexe B a été ajoutée avec des modes opératoires d'essai pour d'autres
    propriétés mécaniques que la résistance à la flexion et la dureté: résistance
    à la traction, à la compression et au choc;<br />\r\nk) l'Annexe C a été ajoutée
    avec des modes opératoires d'essai pour les propriétés thermiques (coefficient
    de dilatation thermique, capacité thermique massique et conductivité thermique);<br
    />\r\nl) l'Annexe D a été ajoutée: elle fournit des informations supplémentaires
    sur la densité et la porosité;<br />\r\nm) l'Annexe E a été ajoutée avec des recommandations
    sur les méthodes d'analyse des éléments;<br />\r\nn) l'Annexe F a été ajoutée:
    elle fournit des informations supplémentaires sur la dureté scléroscopique."
