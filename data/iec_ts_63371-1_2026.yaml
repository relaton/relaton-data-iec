abstract:
- content: IEC TS 63371-1:2026 applies to crystalline silicon wafers for use as the
    substrates in making photovoltaic cells. It describes the methods for measuring
    the electrical characteristics of these silicon wafers. It does not provide mechanical
    information about these wafers. Annex A shows the widely accepted electrical characteristics
    values. The purpose of this document is to establish a standardized specification
    for crystalline silicon wafers, defining their electrical characteristics, the
    applicable test methods, and the acceptable value ranges for those characteristics.
