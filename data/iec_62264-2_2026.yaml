abstract:
- content: "IEC 62264-2:2026 specifies interface content exchanged between manufacturing
    control functions and other enterprise functions as interrelated information models.
    The information models are represented as an interrelated collection of conceptual
    object models which can be used for the implementation of applications with logical
    data and physical data models. The data exchanges in interfaces are scoped as
    between Level 3 manufacturing operations and Level 4 business systems in the hierarchical
    model defined in IEC 62264-1. The purpose of this document is to reduce the risk,
    cost, and errors associated with interface implementation.<br />\r\nSince this
    document covers many manufacturing operations and enterprise domains and there
    are many different standards for those domains, the semantics of this data exchange
    standard are described at a conceptual level intended to enable the other standards
    to be mapped to these semantics. To this end, this document defines a set of elements
    contained in the generic interface, together with a mechanism for extending the
    interface content for implementations.<br />\r\nThe scope is limited to the definition
    of object models and attributes of the exchanged information defined in the IEC
    62264-1.<br />\r\nThis third edition cancels and replaces the second edition published
    in 2013. It is published as a double logo standard. This edition constitutes a
    technical revision. Due to the extent of the changes and updates, this document
    cannot ensure backward compatibility to implementations based on older editions.
    This edition includes the following significant technical changes with respect
    to the previous edition and ANSI/ISA 95.00.02-2018 (ED3):<br />\r\na) object models
    are added for the use of interactive communications to notify subscribers about
    the occurrence of events and to provide context information about the event, making
    the information exchange more efficient and consistent. The added object models
    were the operations event model and operations record model.<br />\r\nb) operations
    location model and spatial definition attribute added to allow the description
    of operation locations.<br />\r\nc) operations test model added to define how
    test specifications and test results are related to testable objects, operations
    test requirements, actual resource, and work definitions.<br />\r\nd) definition
    of possible measurement uncertainty sub-attributes for all value, quantity and
    duration attributes defined in this document.<br />\r\ne) updated hierarchy scope
    model.<br />\r\nf) removed as separate models in this edition were the models
    for product definition, production schedule, production performance, and production
    capability. Their content is covered for all manufacturing operations management
    categories under operations models.<br />\r\ng) object model was added for the
    operations segment capability as a collection of resources related to other operations
    models.<br />\r\nh) updated relationship name and role name conventions established
    in 3.3.4 and implemented across all models and associated tables.<br />\r\ni)
    updated all objects’ relationship role table with explicit source and target names.<br
    />\r\nj) updated common header attributes for objects and property objects established
    in 4.5 and implemented across all models and associated tables.<br />\r\nk) updated
    explanation of the ‘relationships between resource reference objects in operations
    management information models and resource models. These additional resource relationships
    are added to all operations management models.<br />\r\nl) added an annex explanation
    for implementation options for specifying values in unit of measurement attribute.<br
    />\r\nm) added an annex explanation for implementation considerations for inheritance
    and persistence of data exchange object models."
