- content: "IEC 62264-2:2026 spécifie le contenu de l'interface échangé entre les
    fonctions de commande de fabrication et d'autres fonctions d'entreprise sous la
    forme de modèles d'informations interdépendants. Les modèles d'informations sont
    représentés sous la forme d'une collection interdépendante de modèles d'objets
    conceptuels qui peuvent être utilisés pour la mise en œuvre d'applications avec
    des modèles de données logiques et de données physiques. Les échanges de données
    dans les interfaces sont compris entre les opérations de fabrication de niveau
    3 et les systèmes métier de niveau 4 du modèle hiérarchique défini dans l'IEC
    62264-1. L'objet du présent document est de réduire les risques, les coûts et
    les erreurs liés à la mise en œuvre des interfaces.<br />\r\nDans la mesure où
    le présent document couvre de nombreuses opérations de fabrication et de nombreux
    domaines d'entreprise, et où il existe de nombreuses normes différentes dans lesdits
    domaines, la sémantique de la présente norme d'échange de données est décrite
    à un niveau conceptuel qui permet d'adapter les autres normes à cette sémantique.
    Le présent document définit ainsi un ensemble d'éléments contenus dans l'interface
    générique, ainsi qu'un mécanisme d'extension du contenu de l'interface en vue
    de leurs différentes mises en œuvre.<br />\r\nLe domaine d'application se limite
    à la définition des modèles d'objets et des attributs des informations échangées
    définis dans l'IEC 62264-1.<br />\r\nCette troisième édition annule et remplace
    la deuxième édition parue en 2013. Cette édition constitue une révision technique.
    Elle est publiée comme norme double logo. En raison de l'ampleur des modifications
    et des mises à jour, le présent document ne peut assurer la rétrocompatibilité
    avec les mises en œuvre fondées sur des éditions antérieures. Cette édition inclut
    les modifications techniques majeures suivantes par rapport à la précédente édition
    et à l'ANSI/ISA 95.00.02-2018 (ED3):<br />\r\na) ajout de modèles d'objets pour
    l'utilisation de communications interactives afin d'informer les abonnés de la
    survenance d'événements et de fournir des informations de contexte sur l'événement,
    de manière à rendre l'échange d'informations plus efficace et cohérent. Les modèles
    d'objets ajoutés sont le modèle d'événements opérationnels et le modèle de registre
    des opérations;<br />\r\nb) ajout du modèle d'emplacements opérationnels et de
    l'attribut définition spatiale pour permettre la description des emplacements
    opérationnels;<br />\r\nc) ajout d'un modèle d'essai des opérations pour définir
    la manière dont les spécifications d'essai et les résultats d'essai se rapportent
    aux objets vérifiables, aux exigences d'essai des opérations, aux ressources réelles
    et aux définitions de travail;<br />\r\nd) définition des sous-attributs d'incertitude
    de mesure possibles pour tous les attributs de valeur, de grandeur et de durée
    définis dans le présent document;<br />\r\ne) mise à jour du modèle de domaine
    d'application de la hiérarchie;<br />\r\nf) suppression des modèles de définition
    du produit, de calendrier de production, de performances de production et de capabilité
    de production en tant que modèles distincts dans la présente édition. Leur contenu
    est traité pour toutes les catégories de gestion des opérations de fabrication
    dans le cadre de modèles d'opérations;<br />\r\ng) ajout d'un modèle d'objet pour
    la capabilité de segment opérations sous la forme d'un ensemble de ressources
    liées à d'autres modèles d'opérations;<br />\r\nh) mise à jour des conventions
    de dénomination des relations et des rôles établies au 3.3.4 et mises en œuvre
    dans tous les modèles et les tables associées;<br />\r\ni) mise à jour de la table
    de rôles relationnels de tous les objets avec des noms de source et de cible explicites;<br
    />\r\nj) mise à jour des attributs d'en-tête communs pour les objets et les objets
    de propriété établis au 4.5 et mis en œuvre dans tous les modèles et les tables
    associées;<br />\r\nk) mise à jour de l'explication des relations entre les objets
    de référence de ressource dans les modèles d'informations de gestion des opérations
    et les modèles de ressources. Ces relations de ressources supplémentaires sont
    ajoutées à tous les modèles de gestion des opérations;<br />\r\nl) ajout d'une
    explication à l'annexe des options de mise en œuvre pour la spécification des
    valeurs dans l'attribut unité de mesure;<br />\r\nm) ajout d'une explication à
    l'annexe des considérations relatives à la mise en œuvre pour l'héritage et la
    persistance des modèles d'objets d'échange de données."
