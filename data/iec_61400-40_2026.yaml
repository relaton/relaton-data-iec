abstract:
- content: "IEC 61400-40:2026 provides the EMC requirements and test methods that
    apply to the individual wind turbine and all the sub systems which are part of
    the wind turbine.<br />\r\nThe current document applies to measurements on individual
    wind turbines and not multiple wind turbines.<br />\r\nThis document defines the
    requirements and test methods for the verification of the wind turbine performance
    against radiated emissions and the immunity of their components against conducted
    and radiated phenomena. This document is applicable to onshore and offshore wind
    turbines."
  language:
  - en
  script:
  - Latn
  format: text/html
- content: IEC 61400-40:2026 définit les exigences de CEM et les méthodes d'essai
    qui s'appliquent aux éoliennes individuelles ainsi qu'à tous les sous-systèmes
    qui font partie de l'éolienne. Le présent document s'applique aux mesurages effectués
    sur des éoliennes individuelles et non sur plusieurs éoliennes. Le présent document
    définit les exigences et les méthodes d'essai pour la vérification des performances
    des éoliennes en ce qui concerne les émissions rayonnées et de l'immunité de leurs
    composants aux phénomènes conduits et rayonnés. Le présent document s'applique
    aux éoliennes en mer et sur terre. Les considérations relatives à la sécurité
    ne sont pas couvertes par la présente norme.
