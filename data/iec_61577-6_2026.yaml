abstract:
- content: "IEC 61577-6:2026 describes the specific requirements for instruments measuring
    the exposure to airborne radon (222Rn) outdoors and indoors. The exposure is the
    time-integrated radon activity concentration in air accumulated over the exposure
    period.<br />\r\nThis document applies to radon integration measurement systems
    equipped with solid-state nuclear track detectors (SSNTD) installed in an enclosed
