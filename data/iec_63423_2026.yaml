abstract:
- content: "IEC 63423:2026 applies to cable connector assemblies for harsh environment
    purposes that are important to safety. It covers the engineering safety aspects
    to be met in the design, qualification, fabrication, assembling, testing, and
    installation on site of cable connector assemblies to be operated under accident
    conditions.<br />\r\nThis document can be additionally used for cable assemblies
    that are operated under normal conditions.<br />\r\nThis document covers cable
    connector assemblies that are used for the following generic functions:<br />\r\n-
    signal transmission (AC or DC voltage/current; pulses, frequency), or<br />\r\n-
    supplying electrical energy to sensors, transducers, or other devices."
  language:
  - en
  script:
  - Latn
  format: text/html
- content: "IEC 63423:2026 s'applique aux ensembles câble-connecteur pour utilisation
    en environnement sévère qui sont importants pour la sûreté. Il couvre les aspects
    techniques relatifs à la sûreté qui doivent être respectés lors de la conception,
    la qualification, la fabrication, l'assemblage, les essais et l'installation sur
    site des ensembles câble-connecteur à utiliser en conditions accidentelles.<br
    />\r\nLe présent document peut également être utilisé pour les ensembles de câbles
    exploités dans des conditions normales.<br />\r\nLe présent document couvre les
    ensembles câble-connecteur utilisés pour les fonctions génériques suivantes:<br
    />\r\n- transmission de signal (tension/courant alternatif ou continu; impulsions,
    fréquence); ou<br />\r\n- alimentation électrique des capteurs, transducteurs
    ou autres dispositifs."
