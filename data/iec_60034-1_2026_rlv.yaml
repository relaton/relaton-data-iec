abstract:
- content: "IEC 60034-1:2026 RLV contains both the official IEC International Standard
    and its Redline version. The Redline version is available in English only and
    provides you with a quick and easy way to compare all the changes between the
    official IEC Standard and its previous edition.<br /><br />\r\nIEC 60034-1:2026
    is applicable to all rotating electric machines, except rotating electric machines
    for rail and road vehicles, which are covered by the IEC 60349 series of standards.
    Machines with integrated EMC-active components such as a variable frequency converter
    are considered being a power drive system (see the IEC 61800 series of standards).
    In such cases, this document applies to the motor component of the power drive
    system only. Machines within the scope of this document can also be subject to
    superseding, modifying or additional requirements in other standards, for example,
    IEC 60079 and IEC 60092.<br />\r\nNOTE If particular clauses of this document
    are modified to meet special applications, for example machines subject to radioactivity
    or machines for aerospace, all other clauses apply insofar as they are compatible.
    This fifteenth edition cancels and replaces the fourteenth edition published in
    2022. This edition constitutes a technical revision.<br />\r\nThis edition includes
    the following significant technical changes with respect to the previous edition:<br
    />\r\nClause 1: Clarification with respect to machines with integrated EMC-active
    components added<br />\r\nClause 2: Normative references updated<br />\r\nClause
    3: Note on meaning of “agreement” deleted; list of abbreviations added<br />\r\nClause
    4.2.9, 4.2.10: References to IEC TS 60034-25 deleted, as converter duty is now
    defined in 3.36<br />\r\nClause 5.1: Reference to IEC TS 60034-25 converted into
    note<br />\r\nClause 6.6 Clarification of requirements<br />\r\nClause 7.2.1:
    Reference to IEC TS 60034-25 converted into note<br />\r\nClause 7.5: Clarification
    of requirements<br />\r\nClause 7.6: Reference to IEC TS 60034-25 converted into
    note<br />\r\nClause 8.1: Clarification of references<br />\r\nClause 8.6.1: Clarification
    on choice of method for large machines<br />\r\nTable 11: Updated values for thermal
    class 200 (N)<br />\r\nClause 8.10.3: Clarification of requirements<br />\r\nClause
    9.2: Clarification on test voltage for old machines after rewinding<br />\r\nTable
    17: Items 9 and 10 merged and clarified<br />\r\nClause 9.7: Clarification on
    overspeed test for machines held at stock added<br />\r\nTable 20: Clarification
    on test speed for converter duty machines<br />\r\nClause 10.2: Clarification
    of term ‘digital form’<br />\r\nClause:10.3 Note on QR code deleted<br />\r\nClause
    11.1: Reference to protective earth test added<br />\r\nClause 13.1: Clarifying
    flowchart added<br />\r\nClause 13.2.2: Clarification on motors with integrated
    VSD added<br />\r\nClause 13.3: Clarification of requirements after consultation
    with ACEC<br />\r\nClause 13.5: Clarification of requirements after consultation
    with ACEC<br />\r\nClause 14: Note on safety converted to normal text"
