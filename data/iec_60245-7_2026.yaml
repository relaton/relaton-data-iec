abstract:
- content: "IEC 60245-7:2026 defines the particular requirements for heat resistant
    ethylene-vinyl acetate rubber insulated cables of rated voltages up to and including
    450/750 V, which apply in addition to the general requirements specified in IEC
    60245-1, which apply to all cables.<br />\r\nThe tests for cables specified in
    the IEC 60245 series are described in IEC 63294.<br />\r\nIEC 60245-7:2026 includes
    the following significant technical changes with respect to the previous edition:<br
    />\r\na) reference to IEC 60245-2 for the tests has been deleted and replaced
    by IEC 63294;<br />\r\nb) reference to lift cable according to IEC 60245-5 has
    been deleted;<br />\r\nc) normative references have been updated.<br />\r\nThis
    document is to be used in conjunction with IEC 60245-1."
