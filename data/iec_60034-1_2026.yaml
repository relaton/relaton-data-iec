- content: "<!-- NEW! -->IEC 60034-1:2026 est disponible sous forme de IEC 60034-1:2026
    RLV qui contient la Norme internationale et sa version Redline, illustrant les
    modifications du contenu technique depuis l'édition précédente.L'IEC 60034-1:2026
    s'applique à toutes les machines électriques tournantes à l'exception des machines
    destinées aux véhicules ferroviaires et routiers, qui sont couvertes par la série
    de normes IEC 60349. Les machines avec composants CEM actifs intégrés comme un
    convertisseur à fréquence variable sont considérées comme un entraînement électrique
    de puissance (voir la série de normes IEC 61800). Dans ce cas, le présent document
    s'applique uniquement au composant moteur de l'entraînement électrique de puissance.
    Les machines comprises dans le domaine d'application du présent document peuvent
    également être soumises à des exigences nouvelles, modifiées ou complémentaires
    figurant dans d'autres normes, par exemple l'IEC 60079 et l'IEC 60092.<br />\r\nNOTE Si
    certains articles du présent document sont modifiés afin de permettre des applications
    spéciales, par exemple pour les machines soumises à la radioactivité ou les machines
    aérospatiales, tous les autres articles s'appliquent dans la mesure où ils sont
    compatibles.<br />\r\nCette quinzième édition annule et remplace la quatorzième
    édition parue en 2022. Cette édition constitue une révision technique.<br />\r\nCette
    édition inclut les modifications techniques majeures suivantes par rapport à l'édition
    précédente:<br />\r\nParagraphe 1: Clarification ajoutée en ce qui concerne les
    machines avec composants CEM actifs intégrés<br />\r\nParagraphe 2: Références
    normatives mises à jour<br />\r\nParagraphe 3: Note sur la signification du terme
    \"accord\" supprimée, liste des abréviations ajoutée<br />\r\nParagraphe 4.2.9,
    4.1.10: Références à l'IEC TS 60034-25 supprimées, le terme \"machine fonctionnant
    exclusivement sur convertisseur\" étant désormais défini en 3.36<br />\r\nParagraphe
    5.1: Référence à l'IEC TS 60034-25 convertie en note<br />\r\nParagraphe 6.6:
    Clarification des exigences<br />\r\nParagraphe 7.2.1: Référence à l'IEC TS 60034-25
    convertie en note<br />\r\nParagraphe 7.5: Clarification des exigences<br />\r\nParagraphe
    7.6: Référence à l'IEC TS 60034-25 convertie en note<br />\r\nParagraphe 8.1:
    Clarification des références<br />\r\nParagraphe 8.6.1: Clarification du choix
    de la méthode pour les machines de grande taille<br />\r\nTableau 11: Valeurs
    mises à jour pour la classe thermique 200 (N)<br />\r\nParagraphe 8.10.3: Clarification
    des exigences<br />\r\nParagraphe 9.2: Clarification de la tension d'essai des
    anciennes machines après rebobinage<br />\r\nTableau 17: Points 9 et 10 fusionnés
    et clarifiés<br />\r\nParagraphe 9.7: Clarification ajoutée en ce qui concerne
    l'essai de survitesse des machines stockées<br />\r\nTableau 20: Clarification
    de la vitesse d'essai pour les machines fonctionnant exclusivement sur convertisseur<br
    />\r\nParagraphe 10.2: Clarification du terme \"forme numérique\"<br />\r\nParagraphe
    10.3: Note sur le QR code supprimée<br />\r\nParagraphe 11.!: Référence à l'essai
    de mise à la terre de protection ajoutée<br />\r\nParagraphe 13.1: Ajout d'un
    organigramme explicatif<br />\r\nParagraphe 13.2.2: Clarification ajoutée en ce
    qui concerne les moteurs avec variateur de vitesse intégré<br />\r\nParagraphe
    13.3: Clarification des exigences après consultation de l'ACEC<br />\r\nParagraphe
    13.5:Clarification des exigences après consultation de l'ACEC<br />\r\nParagraphe
    14: Note sur la sécurité convertie en texte normal"
