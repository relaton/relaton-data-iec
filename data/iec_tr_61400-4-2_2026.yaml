abstract:
- content: "IEC TR 61400-4-2:2026 provides non-binding information regarding the lubricant,
    lubrication system layout, and performance for wind turbine gearboxes. This document
    covers oil lubricated gearboxes. Additionally, guidance for selected lubricant
    parameters as well as for monitoring and maintaining lubricant characteristics
    is offered. This document provides a common reference for lubrication related
    matters for wind turbine drive trains. ISO/TR 18792 provides information for lubrication
    of industrial gearboxes. Some information is similar or identical to this document.<br
    />\r\nThis document is useful to wind turbine system and component designers,
    wind turbine manufacturers, and owners/operators to ensure that lubricant related
    matters are addressed in the gearbox design and operation phases.<br />\r\nThis
    current document covers oil lubricated gearboxes and is developed based on experience
    with predominantly gearboxes with rolling bearings. It can be applied to gearboxes
    with plain bearings but possibly does not yet address all aspects of this technology.
    The document structure is prepared to receive further content related to other
    components in the wind turbine drivetrain and include additional types of lubricants."
