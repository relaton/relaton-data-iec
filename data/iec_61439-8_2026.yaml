- content: "L'IEC 61439-8:2026 spécifie les exigences relatives à la conception et
    à la vérification des ensembles d'appareillage à basse tension destinés à être
    utilisés dans les applications photovoltaïques.<br />\r\nLes EPV présentent les
    caractéristiques suivantes:<br />\r\n- ensembles utilisés pour la combinaison
    de l'énergie électrique des réseaux en courant continu, où les tensions d'entrée
    et de sortie ne dépassent pas 1 500 V en courant continu;<br />\r\n- ensembles
    alimentés à partir d'un réseau en courant alternatif dont la tension ne dépasse
    pas 1 000 V en courant alternatif pour les applications auxiliaires et de commande;<br
    />\r\n- ensembles fixes avec une enveloppe;<br />\r\n- ensembles destinés à être
    utilisés par des personnes autorisées (voir l'IEC 61439 1:2020, 3.7.17), mais
    qui peuvent être situés dans une zone accessible aux personnes ordinaires (voir
    l'IEC 61439 1:2020, 3.7.16);<br />\r\n- ensembles conçus pour une utilisation
    intérieure ou extérieure.<br />\r\nLe présent document identifie les définitions,
    spécifie les conditions d'emploi, décrit les exigences de construction, définit
    les caractéristiques techniques et fournit des vérifications pour les EPV. Les
    EPV peuvent également inclure des dispositifs de commande ou de signalisation,
    ou les deux, associés à la distribution de l'énergie électrique. Le présent document
    s'applique à tous les EPV, qu'ils soient conçus et fabriqués à l'unité ou qu'ils
    soient complètement normalisés et fabriqués en quantité. La fabrication ou l'assemblage,
    ou les deux, peuvent être réalisés par une entité qui n'est pas le constructeur
    d'origine (voir l'IEC 61439 1:2020, 3.10.1).<br />\r\nLe présent document ne s'applique
    pas:<br />\r\n- aux dispositifs considérés séparément, par exemple les disjoncteurs,
    les fusibles-interrupteurs et les composants indépendants, comme les démarreurs
    de moteurs, les alimentations à découpage (SMPS), les alimentations sans interruption
    (ASI), les modules d'entraînement principaux (MEP), les modules d'entraînement
    complets (MEC), les entraînements électriques de puissance (EEP) à vitesse variable,
    les systèmes autonomes de stockage d'énergie (systèmes à batteries et condensateurs)
    et autres matériels électroniques qui sont conformes aux normes de produits pertinentes,
    comme les boîtes de jonction de modules photovoltaïques. Le présent document décrit
    leur intégration dans un EPV ou dans une enveloppe vide utilisée en tant que partie
    d'un EPV;<br />\r\n- aux équipements de conversion de puissance (PCE) photovoltaïque
    qui comprennent des sous-systèmes à combinaison de courant continu, couverts par
    la série IEC 62109.<br />\r\nCertaines applications, comme les atmosphères explosives
    ou la sécurité fonctionnelle, ou les deux, peuvent être soumises aux exigences
    d'autres normes ou de règles d'installation locales, en plus de celles spécifiées
    dans la série IEC 61439. Le présent document ne s'applique pas aux types d'ensembles
    spécifiques couverts par d'autres parties de la série IEC 61439."
