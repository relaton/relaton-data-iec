- content: "L'IEC 61375-1:2026 s’applique à l’architecture des systèmes de communication
    de données dans les trains à composition variable, c’est-à-dire qu’elle couvre
    l’architecture d’un système de communication de données entre les véhicules des
    trains considérés, les communications de données dans les véhicules et les communications
    de données train-sol. L'application de IEC 61375-1 aux technologies de réseau
    de train permet l'interopérabilité de véhicules individuels dans des trains à
    composition variable en trafic international. Les systèmes de communication de
    données dans les véhicules sont donnés comme solutions recommandées pour fonctionner
    avec ledit TCN. Dans tous les cas, le fournisseur devra apporter la preuve de
    la compatibilité entre un réseau central de train proposé et un réseau de rame
    proposé. Par ailleurs, IEC 61375-1 pourrait s'appliquer aux rames non modifiables
    et aux trains à unités multiples après accord entre acheteur et fournisseur. Cette
    quatrième édition annule et remplace la troisième édition publiée en 2012. Cette
    édition constitue une révision technique.<br />\r\nCette édition inclut également
    les modifications techniques majeures suivantes par rapport à l'édition précédente:<br
    />\r\na) Extension des topologies de réseau central de train: topologie agrégée
    et séparée<br />\r\nb) Ajout d'une vérification indépendante de l'orientation
    de la rame avec une topologie séparée de réseau central de train<br />\r\nc) Introduction
    des technologies sans fil: réseau central de train sans fil et réseau de rame
    sans fil<br />\r\nd) Possibilité de réseaux virtuels<br />\r\ne) Définition des
    classes de données et des exigences de protocole adaptées au domaine OMTS<br />\r\nf)
    Nouvel article sur la cybersécurité dans les réseaux embarqués de train"
