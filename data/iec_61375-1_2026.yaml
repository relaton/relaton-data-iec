abstract:
- content: "IEC 61375-1:2026 applies to the architecture of data communication systems
    in open trains, i.e. it covers the architecture of a communication system for
    the data communication between vehicles of the said open trains, the data communication
    within the vehicles and the data communication from train to the ground. The applicability
    of IEC 61375-1 to the train network technologies allows for interoperability of
    individual vehicles within open trains in international traffic. The data communication
    systems inside vehicles are given as recommended solutions to cope with the said
    TCN. In any case, proof of compatibility between a proposed train backbone and
    a proposed consist network will have to be brought by the supplier. IEC 61375-1
    might be additionally applicable to closed trains and multiple unit trains when
    so agreed between purchaser and supplier. This fourth edition cancels and replaces
    the third edition published in 2012. This edition constitutes a technical revision.<br
    />\r\nThis edition includes the following significant technical changes with respect
    to the previous edition:<br />\r\na) Extension of train backbone topologies: aggregated
    and segregated topology;<br />\r\nb) Added independent consist orientation check
    with segregated train backbone topology;<br />\r\nc) Introduction of wireless
    technologies: wireless train backbone and wireless consist network;<br />\r\nd)
    Possibility of virtual networks;<br />\r\ne) Definition of data classes and protocol
    requirements suitable for the OMTS domain;<br />\r\nf) New clause about cybersecurity
    in train communication networks."
