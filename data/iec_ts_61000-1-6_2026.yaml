abstract:
- content: "IEC TS 61000-1-6:2026, which is a Technical Specification, defines the
    test procedures used to establish uniform requirements for mechanical performance
    – galloping. It applies to optical fibre cables like ADSS, OPGW or OPPC that can
    be exposed to galloping phenomena.<br />\r\nSee IEC 60794-1-2 for general requirements
    and definitions and for a complete reference guide to test methods of all types.<br
    />\r\nThis first edition cancels and replaces the first edition of IEC TR 61000-1-6
    published in 2012.<br />\r\nThis edition constitutes a technical revision. This
    edition includes the following significant technical changes with respect to the
    previous<br />\r\nedition:<br />\r\na) purpose of and responsibilities in measurement
    uncertainty evaluation by testing and calibration laboratories, technical committees
    dealing with EMC requirements have been introduced;<br />\r\nb) classification
    of measurement uncertainty contributions (measurement uncertainty, measurement
    instrumentation uncertainty, intrinsic uncertainty of the measurand) has been
    revised;<br />\r\nc) new clauses devoted to measurement uncertainty in emission
    test methods and measurement uncertainty in immunity test methods and in calibration
    have been added;<br />\r\nd) methods of measurement uncertainty calculation have
    been enriched by introducing the GUM Supplement 1 (GUMS1) numerical approach based
    on Monte Carlo method;<br />\r\ne) measurement uncertainty budget development
    has been revised to include the basic steps to follow in case of application of
    the GUM method or of the GUMS1 method;<br />\r\nf) a clause specifically devoted
    to the measurement model function has been added to emphasize the importance of
    the measurement model and to provide guidance when the measurement model is unknown;<br
    />\r\ng) the clause on probability density functions has been revised to include
    the Student-t probability density function;<br />\r\nh) the clause on Type A and
    Type B evaluations of uncertainty has been revised to improve readability;<br
    />\r\ni) the clause on the conversion from linear quantities to decibel and vice
    versa has been revised to improve readability and make some corrections;<br />\r\nj)
    the clause on the applicability of measurement uncertainty has been modified to
    improve readability and to remove statements conflicting with conformity assessments
    standards;<br />\r\nk) Annex A and Annex B have been revised by including results
    of GUMS1 application;<br />\r\nl) new annexes have been introduced, namely Annex
    C (on metrological confirmation of measurement equipment), Annex D (on sampling
    statistics, moved from the main text to this annex to improve readability of the
    whole document), Annex E (on robust statistics for processing interlaboratory
    comparison data, with example), Annex F (including an example of application of
    MU for the assessment of the risk of an out of tolerance of measurement equipment)
    and Annex G (including an example of application of MU for the evaluation of in-tolerance
    probability as a function of tolerance to uncertainty ratio – TUR)."
