abstract:
- content: "IEC TS 62257-200:2026 provides a method for describing the results to
    be achieved by the electrification system independently of the technical solutions
    that could be implemented.<br />\r\nThe purpose of this part of IEC 62257 is to
    provide a method to assist designers of renewable energy systems, project contractors
    and project developers to design the electrification system for isolated sites
    while matching the identified needs. This part of IEC 62257 assesses the needs
    of the users and the different power system architectures which can be used for
    meeting these needs. In relation to the needs of the different participants to
    the project, functional requirements to be achieved by the production and distribution
    subsystems are listed.<br />\r\nThis document provides technical standardization
    to different stakeholders (including but not limited to project developers, financing
    agencies, testing agencies, installers, etc.) involved in electrification projects
    for access to electricity for those not solely connected to the regional grid,
    through the setting up of off-grid renewable energy and hybrid systems (including
    micro-grids) with a voltage less than or equal to 1 000 V for AC (alternating
    current) or a voltage less than or equal to 1 500 V for DC (direct current). This
    document could be used for rural electrification, also for electrification of
    remote sites in developed countries, or any requirement for electricity access
    that cannot be met by attaching solely to the national utility grid. They promote
    the use of renewable energies, but at this time they do not deal with clean-energy
    mechanisms development (CO2 emissions, carbon credit, etc.)."
