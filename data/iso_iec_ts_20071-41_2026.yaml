abstract:
- content: "<p>This document provides requirements and recommendations for the design
    and use of pictograms, photos, and icons in augmentative and alternative communication
    (AAC) in the information and communication technology (ICT) domain.</p><p>This
    document recognizes that AAC can be delivered on various sized devices including
    computer displays, tablets, and smart phones. It applies to pictograms, photos,
    and icons that can be used on a range of devices. It is not specific to particular
    devices or the particular software used.</p><p>This document focuses on the needs
    of those users who cannot use a natural language in written or spoken form to
    communicate with a peer group or the community as a whole. In facilitating communication
    with those other people, it also serves them.</p>"
