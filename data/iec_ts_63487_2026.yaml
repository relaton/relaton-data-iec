abstract:
- content: "IEC TS 63487:2026 serves as a specification for the joint commissioning
    of grid-connection of offshore wind farms (GCOWF) using the voltage source converter
    based high voltage direct current (VSC HVDC) transmission system.<br />\r\nThis
    document provides the technical specification on the commissioning precondition,
    objectives, procedures, items, methods and requirements of grid-connection of
    offshore wind farms using the VSC HVDC power transmission, particularly focusing
    on the special test items of offshore wind farms.<br />\r\nThis document covers
    the commissioning of offshore wind farms, testing of onshore DC energy dissipation
    device, special test items for transmission test, coordination function testing
    among VSC HVDC, DC energy dissipation device, offshore wind farm and automatic
    generation control (AGC). However, the conventional commissioning test items of
    the onshore VSC HVDC system are out of scope."
