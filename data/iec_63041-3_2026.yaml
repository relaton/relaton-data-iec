abstract:
- content: "<!-- NEW! -->IEC 63041-3:2026 is available as IEC 63041-3:2026 RLV which
    contains the International Standard and its Redline version, showing all changes
    of the technical content compared to the previous edition.IEC 63041-3:2026 is
    applicable to piezoelectric physical sensors mainly used in the field of process
    control, wireless monitoring, dynamics, thermodynamics, vacuum engineering, and
    environmental sciences. This document provides users with technical guidelines
    as well as basic knowledge of common physical sensors. Piezoelectric sensors covered
    herein are those applied to the detection and measurement of physical quantities
    such as force, pressure, torque, viscosity, temperature, film thickness, acceleration,
    vibration, and tilt angle.<br />\r\nThis edition includes the following significant
    technical changes with respect to the previous edition:<br />\r\na) Some terms
    in Clause 3 have been updated to be consistent with IEC TS 61994-5:2023."
  language:
  - en
  script:
  - Latn
  format: text/html
- content: "<!-- NEW! -->IEC 63041-3:2026 est disponible sous forme de IEC 63041-3:2026
    RLV qui contient la Norme internationale et sa version Redline, illustrant les
    modifications du contenu technique depuis l'édition précédente.L’IEC 63041-3:2026
    s'applique aux capteurs physiques piézoélectriques principalement utilisés dans
    le domaine du contrôle des processus, de la surveillance sans fil, de la dynamique,
    de la thermodynamique, de l'ingénierie du vide et des sciences de l'environnement.
    Ce document fournit aux utilisateurs des lignes directrices techniques ainsi que
    des connaissances de base sur les capteurs physiques courants. Les capteurs piézoélectriques
    dont il est question ici sont ceux qui sont appliqués à la détection et à la mesure
    de grandeurs physiques telles que la force, la pression, le couple, la viscosité,
    la température, l'épaisseur du film, l'accélération, la vibration et l'angle d'inclinaison.<br
    />\r\nCette édition inclut les modifications techniques majeures suivantes par
    rapport à l’édition précédente:<br />\r\na) Certains termes de l'Article 3 ont
    été mis à jour pour être cohérents avec l'IEC TS 61994‑5:2023."
