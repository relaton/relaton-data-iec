abstract:
- content: "IEC 61757:2026 defines, classifies, and provides a framework of generic
    tests or measurement methods for characterizing and specifying fibre optic sensors,
    including their specific components and subassemblies. The requirements of this
    document apply to all related fibre optic sensor standards that are part of the
    IEC 61757 series. Other parts of the IEC 61757 series contain requirements that
    are specific to sensors that measure particular quantities, and to a particular
    style or variant of such a fibre optic sensor. This second edition cancels and
    replaces the first edition published in 2018. This edition constitutes a technical
    revision.<br />\r\nThis edition includes the following significant technical changes
    with respect to the previous edition:<br />\r\na) expansion of the list of metrological
    parameters;<br />\r\nb) updates of the terms and definitions;<br />\r\nc) updates
    of the normative references and bibliography;<br />\r\nd) updates of the technical
    descriptions in Annex A."
  language:
  - en
  script:
  - Latn
  format: text/html
- content: "IEC 61757:2026 définit, classe et fournit un cadre d’essais génériques
    ou de méthodes de mesure pour caractériser et spécifier les capteurs fibroniques,
    y compris leurs composants et sous-ensembles spécifiques. Les exigences du présent
    document s’appliquent à toutes les normes sur les capteurs fibroniques associées
    qui font partie intégrante de la série IEC 61757. Les autres parties de la série
    IEC 61757 contiennent des exigences spécifiques aux capteurs qui mesurent des
    grandeurs particulières et à un modèle particulier ou une variante d’un tel capteur
    fibroniques. Cette deuxième édition annule et remplace la première édition parue
    en 2018. Cette édition constitue une révision technique.<br />\r\nCette édition
    inclut les modifications techniques majeures suivantes par rapport à l’édition
    précédente:<br />\r\na) extension de la liste des paramètres métrologiques;<br
    />\r\nb) mises à jour des termes et définitions;<br />\r\nc) mises à jour des
    références normatives et de la bibliographie;<br />\r\nd) mises à jour des descriptions
    techniques de l’Annexe A."
