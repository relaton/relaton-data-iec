- content: "<p>This document specifies the crypto suite for Grain-128A for the ISO/IEC
    18000 air interface standards for radio frequency identification (RFID) devices.</p><p>This
    document specifies various authentication methods and methods of use for the cipher.</p><p>In
    this document, a Tag and an Interrogator can support one, a subset or all of the
