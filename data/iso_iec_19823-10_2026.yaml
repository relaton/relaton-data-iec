abstract:
- content: "<p>This document describes the test methods for determining conformance
    for the security crypto suite AES-128 defined in ISO/IEC 29167-10.</p><p>This
    document contains conformance tests for all mandatory and applicable optional
    functions.</p><p>Unless otherwise specified, the tests in this document are only
    applicable to radio frequency identification (RFID) Tags and Interrogators defined
    in the ISO/IEC 15693 series and in the ISO/IEC 18000 series using ISO/IEC 29167-10.</p>"
