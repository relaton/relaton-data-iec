abstract:
- content: "IEC TS 62607-4-11:2026, which is a Technical Specification, specifies
    the dispersion stability by using the zeta potential (ζ) method for nano-carbon
    materials for lithium ion capacitors. This document describes not only the dispersion
    stability of nano-carbon materials but also the effect of different surfactants
    as well as the evaluation method for testing long-term dispersion stability using
    the zeta potential (ζ). This document describes:<br />\r\n• Dispersion stability
    of nano-carbon materials using zeta potential (ζ) for electrochemical capacitors
    using carbon nanomaterials as electrodes<br />\r\n• Effect of different surfactants<br
    />\r\n• Evaluation of long-term dispersion stability using the zeta potential
    (ζ) method"
