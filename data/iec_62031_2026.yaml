abstract:
- content: "IEC 62031:2026 specifies safety requirements for LED modules for operation
    on DC supplies up to 1 500 V or on AC supplies up to 1 000 V. This document does
    not include requirements for performance characteristics of LED modules.<br />\r\nThis
    document does not apply to:<br />\r\n- LED packages;<br />\r\n- LED modules for
    automotive lighting;<br />\r\n- OLED modules;<br />\r\n- LED lamps.<br />\r\nThis
    third edition cancels and replaces the second edition published in 2018. This
    edition constitutes a technical revision.<br />\r\nThis edition includes the following
    significant technical changes with respect to the previous edition:<br />\r\na)
    Complete review of the document structure, detailed technical requirements and
    tests, including but not limited to what is individually described under items
    b) to i);<br />\r\nb) Clarification of the scope and revision of the applicability
    of this document to independent and integral LED modules;<br />\r\nc) Updated
    terms and definitions;<br />\r\nd) Clearer specification for clause general requirements
    and clause general test requirements;<br />\r\ne) Update of the marking clause,
    such as marking of control terminals;<br />\r\nf) A full review and update of
    the electrical safety, thermal safety, and mechanical safety requirements preventing
    misinterpretation and ambiguity;<br />\r\ng) Updated photobiological safety requirements;<br
    />\r\nh) Revised and updated fault conditions and abnormal conditions requirements;<br
    />\r\ni) Removal of the annex relating to conformity testing during manufacture."
  language:
  - en
  script:
  - Latn
  format: text/html
- content: "L'IEC 62031:2026 spécifie les exigences de sécurité applicables aux modules
    à diodes électroluminescentes (LED) pour un fonctionnement avec des alimentations
    jusqu'à 1 500 V en courant continu ou jusqu'à 1 000 V en courant alternatif. Le
    présent document ne contient pas d'exigences relatives aux caractéristiques de
    performances des modules LED.<br />\r\nLe présent document ne s'applique pas aux:<br
    />\r\n- boîtiers LED;<br />\r\n- modules LED pour l'éclairage automobile;<br />\r\n-
    modules OLED;<br />\r\n- lampes LED.<br />\r\nCette troisième édition annule et
    remplace la deuxième édition parue en 2018. Cette édition constitue une révision
    technique.<br />\r\nCette édition inclut les modifications techniques majeures
    suivantes par rapport à l'édition précédente:<br />\r\na) révision complète de
    la structure du document, description détaillée des exigences techniques et essais,
    notamment les points b) à i) ci-dessous;<br />\r\nb) clarification du domaine
    d'application et révision de l'applicabilité du présent document aux modules LED
    indépendants et intégrés;<br />\r\nc) mise à jour des termes et définitions;<br
    />\r\nd) spécification plus précise des articles \"Exigences générales\" et \"Exigences
    générales pour les essais\";<br />\r\ne) mise à jour de l'article \"Marquage\",
    notamment le marquage des bornes de commande;<br />\r\nf) révision et mise à jour
    complètes des exigences relatives à la sécurité électrique, à la sécurité thermique
    et à la sécurité mécanique, afin d'éviter toute confusion et toute ambiguïté;<br
    />\r\ng) mise à jour des exigences relatives à la sécurité photobiologique;<br
    />\r\nh) révision et mise à jour des conditions de défaut et des conditions anormales;<br
    />\r\ni) suppression de l'annexe relative aux essais de conformité pendant la
    fabrication."
