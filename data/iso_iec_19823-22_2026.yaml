abstract:
- content: "<p>This document describes the test methods for determining conformance
    for the security crypto suite SPECK defined in ISO/IEC 29167-22.</p><p>This document
    contains conformance tests for all mandatory functions.</p><p>Unless otherwise
    specified, the tests in this document are only applicable to radio frequency identification
