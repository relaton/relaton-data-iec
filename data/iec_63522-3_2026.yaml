abstract:
- content: IEC 63522-3:2026 is used for testing along with the appropriate severities
    and conditions for measurements and tests designed to assess the ability of DUTs
    to perform under expected conditions of transportation, storage and all aspects
    of operational use.
  language:
  - en
  script:
  - Latn
  format: text/html
- content: "IEC 63522-3:2026 traite des essais ainsi que des sévérités et conditions
    appropriées pour les mesurages et essais destinés à évaluer l'aptitude des dispositifs
    en essai (DUT) à fonctionner dans les conditions prévues de transport, de stockage
    et dans tous les aspects de leur utilisation opérationnelle.<br />\r\nL'objet
    de cet essai est de s'assurer que les caractéristiques de la ou des bobines des
    relais se situent dans les limites spécifiées"
