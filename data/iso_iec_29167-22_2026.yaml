abstract:
- content: "<p>This document specifies the crypto suite for SPECK for the ISO/IEC
    18000 air interface standards for radio frequency identification (RFID) devices.</p><p>SPECK
    is a symmetric block cipher that is parameterized in both its block length and
    key length. The block/key length options supported in this crypto suite (in bits)
    are 64/96, 96/96, 64/128, 128/128 and 128/256.</p><p>In this document, a Tag and
    an Interrogator can support one, a subset or all of the specified options, clearly
    stating what is supported.</p>"
